<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    
    <!-- Primary Meta Tags -->
    <title>HONEYMOON — The World's Relationship & Opportunity Platform</title>
    <meta name="title" content="HONEYMOON — The World's Relationship & Opportunity Platform" />
    <meta name="description" content="Connect for love, friendship, travel, language exchange, freelancing, and AI work. Join 50,000+ users across 120+ countries. One profile, endless possibilities." />

    <meta name="author" content="HONEYMOON" />

    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <link rel="canonical" href="https://honeymoon.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://honeymoon.app/" />
    <meta property="og:title" content="HONEYMOON — The World's Relationship & Opportunity Platform" />
    <meta property="og:description" content="Connect for love, friendship, travel, language exchange, freelancing, and AI work. Join 50,000+ users across 120+ countries." />
    <meta property="og:image" content="https://honeymoon.app/og-image.jpg" />
    <meta property="og:site_name" content="HONEYMOON" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://honeymoon.app/" />
    <meta name="twitter:title" content="HONEYMOON — The World's Relationship & Opportunity Platform" />
    <meta name="twitter:description" content="Connect for love, friendship, travel, language exchange, freelancing, and AI work. Join 50,000+ users across 120+ countries." />
    <meta name="twitter:image" content="https://honeymoon.app/og-image.jpg" />
    <meta name="twitter:creator" content="@honeymoon" />

    <!-- App Meta Tags -->
    <meta name="theme-color" content="#e11d48" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HONEYMOON" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#e11d48" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "HONEYMOON",
      "description": "The world's relationship and opportunity platform",
      "url": "https://honeymoon.app",
      "applicationCategory": "SocialNetworkingApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "5000"
      },
      "publisher": {
        "@type": "Organization",
        "name": "HONEYMOON",
        "logo": {
          "@type": "ImageObject",
          "url": "https://honeymoon.app/logo.png",
          "width": 250,
          "height": 60
        }
      }
    }
    </script>

    <!-- Manifest & Icons -->
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <body>
